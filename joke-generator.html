<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌻 Random Joke Generator 🌻</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff9c4 0%, #ffe082 40%, #ffca28 70%, #fff176 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(255, 193, 7, 0.35);
      padding: 40px 36px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .card-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #b8860b;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 0.95rem;
      color: #8d6e63;
      margin-bottom: 32px;
    }

    .joke-area {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    /* Loading spinner */
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #ffe082;
      border-top-color: #ffc107;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 12px;
      color: #b8860b;
      font-size: 0.95rem;
    }

    /* Joke text */
    .joke-setup {
      font-size: 1.1rem;
      color: #4e342e;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .joke-delivery {
      font-size: 1.05rem;
      color: #b8860b;
      font-weight: 400;
      line-height: 1.6;
      background: #fffde7;
      border-left: 4px solid #ffc107;
      padding: 12px 16px;
      border-radius: 8px;
      width: 100%;
      text-align: left;
    }

    .joke-single {
      font-size: 1.1rem;
      color: #4e342e;
      line-height: 1.7;
    }

    /* Error message */
    .error-msg {
      background: #ffebee;
      color: #c62828;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.95rem;
      width: 100%;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #ffd700, #ffc107);
      color: #5d4037;
      border: none;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(255, 193, 7, 0.5);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 28px rgba(255, 193, 7, 0.6);
    }

    .btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #b8860b;
      font-size: 0.9rem;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 20px;
      }

      .card-header h1 {
        font-size: 1.5rem;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>🌻 Random Jokes 🌻</h1>
      <p>A little laugh to brighten your day</p>
    </div>

    <div class="joke-area" id="jokeArea">
      <p class="joke-single" id="placeholder">Press the button to get your first joke! 😄</p>
    </div>

    <button class="btn" id="jokeBtn" onclick="fetchJoke()">
      <span>😂</span> Get New Joke
    </button>

    <a href="index.html" class="back-link">🏠 Back to home</a>
  </div>

  <script>
    const jokeArea = document.getElementById('jokeArea');
    const jokeBtn = document.getElementById('jokeBtn');

    function showLoading() {
      jokeBtn.disabled = true;
      jokeArea.innerHTML = `
        <div class="spinner"></div>
        <p class="loading-text">Fetching a joke…</p>
      `;
    }

    function showJoke(joke) {
      jokeBtn.disabled = false;
      if (joke.type === 'twopart') {
        jokeArea.innerHTML = `
          <p class="joke-setup">${escapeHtml(joke.setup)}</p>
          <p class="joke-delivery">${escapeHtml(joke.delivery)}</p>
        `;
      } else {
        jokeArea.innerHTML = `<p class="joke-single">${escapeHtml(joke.joke)}</p>`;
      }
    }

    function showError(message) {
      jokeBtn.disabled = false;
      jokeArea.innerHTML = `<div class="error-msg">⚠️ ${escapeHtml(message)}</div>`;
    }

    const escapeMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => escapeMap[ch]);
    }

    async function fetchJoke() {
      showLoading();
      try {
        const response = await fetch(
          'https://v2.jokeapi.dev/joke/Any?safe-mode&blacklistFlags=nsfw,religious,political,racist,sexist,explicit',
          { signal: AbortSignal.timeout(8000) }
        );
        if (!response.ok) {
          throw new Error(`Server responded with status ${response.status}`);
        }
        const data = await response.json();
        if (data.error) {
          throw new Error(data.message || 'The joke API returned an error.');
        }
        showJoke(data);
      } catch (err) {
        if (err.name === 'TimeoutError' || err.name === 'AbortError') {
          showError('Request timed out. Please try again.');
        } else {
          showError(err.message || 'Could not load a joke. Please check your connection and try again.');
        }
      }
    }
  </script>
</body>
</html>
